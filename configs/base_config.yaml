project:
  name: mytranformer
  seed: 42

model:
  model_path: ./local_models/Qwen3.5-9B
  trust_remote_code: false
  allow_remote_files: false
  device: auto
  dtype: auto

runtime:
  max_input_tokens: null
  max_new_tokens: 128
  temperature: 0.0
  top_p: 1.0
  stop_on_eos: true

methods:
  baseline:
    enabled: true
  streamingllm:
    enabled: true
    sink_size: 4
    local_window_size: 256
  h2o:
    enabled: true
    sink_size: 4
    local_window_size: 256
    heavy_hitter_size: 128

io:
  input_jsonl: ./data/raw/samples.jsonl
  output_jsonl: ./outputs/eval_results.jsonl
  save_step_trace: false
